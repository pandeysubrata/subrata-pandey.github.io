locale                   : "en-US"
site_theme               : "default"
title                    : "Subrata Pandey's Profile"
title_separator          : "-"
name                     : "Subrata Pandey"
description              : "Subrata Pandey's academic portfolio"
url                      : "https://pandeysubrata.github.io"
baseurl                  : ""
repository               : "pandeysubrata/pandeysubrata.github.io"

# Author Profile (FIXED)
author:
  avatar           : "profile.png"
  name             : "Subrata Pandey"
  bio              : "Ph.D. Scholar in Electrical Engineering at NIT Durgapur"
  location         : "West Bengal, India"
  employer         : "NIT Durgapur"
  email            : "subratapandey.ee@gmail.com"

  # Academic Profiles
  googlescholar    : "https://scholar.google.com/citations?user=O5_RI1oAAAAJ"
  orcid            : "https://orcid.org/0000-0001-5952-7438"
  researchgate     : "https://www.researchgate.net/profile/Subrata-Pandey"

  # Developer / Social
  github           : "pandeysubrata"
  linkedin         : "pandeysubrata"

# Publication Category
publication_category:
  books:
    title: "Books"
  manuscripts:
    title: "Journal Papers (Scopus)"
  conferences:
    title: "Conferences"

# Site Settings
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false

# Comments
comments:
  provider               : false

# SEO
google_site_verification :
bing_site_verification   :

# Social Sharing
twitter:
  username               :
facebook:
  username               :

# Analytics
analytics:
  provider               : false

# Reading Files
include:
  - .htaccess
  - _pages
  - files

exclude:
  - node_modules
  - vendor
  - .bundle
  - .sass-cache
  - .jekyll-cache
  - .github

# Markdown
markdown: kramdown
highlighter: rouge

# Collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true

# Sass
sass:
  sass_dir: _sass
  style: compressed

# Output
permalink: /:categories/:title/
timezone: Etc/UTC

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
